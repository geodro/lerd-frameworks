name: wordpress
version: "5"
label: WordPress
public_dir: .
php:
  min: "7.4"
  max: "8.1"

detect:
  - file: wp-login.php
  - file: wp-config.php

env:
  fallback_file: wp-config.php
  fallback_format: php-const
  url_key: WP_HOME
  services:
    mysql:
      detect:
        - key: DB_HOST
      vars:
        - DB_NAME={{site}}
        - DB_USER=root
        - DB_PASSWORD=lerd
        - DB_HOST=lerd-mysql

logs:
  - path: wp-content/debug.log
    format: raw

composer: false
npm: false
